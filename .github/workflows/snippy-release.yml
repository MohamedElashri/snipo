name: Snippy Release

on:
  push:
    tags:
      - 'snippy-v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (e.g. snippy-v0.1.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release Snippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: tui/go.sum

      - name: Verify Version Match
        run: |
          # Extract version from tui/cmd/snippy/main.go
          CODE_VERSION=$(grep 'Version = ' tui/cmd/snippy/main.go | cut -d '"' -f 2)
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ inputs.tag_name }}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
          fi
          
          # Remove 'snippy-v' prefix if present from tag for comparison
          CLEAN_TAG_VERSION=${TAG_VERSION#snippy-v}
          
          echo "Code version: $CODE_VERSION"
          echo "Tag version: $TAG_VERSION (Clean: $CLEAN_TAG_VERSION)"
          
          if [ "$CODE_VERSION" != "$CLEAN_TAG_VERSION" ]; then
            echo "::error::Version mismatch! tui/cmd/snippy/main.go ($CODE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create local tag for GoReleaser
        run: |
          # GoReleaser OSS needs a strictly valid semver to parse versioning 
          # for the archives and Homebrew generation. We create a local tag.
          git tag v${{ env.CLEAN_TAG_VERSION }} HEAD

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
          workdir: ./tui
        env:
          GORELEASER_CURRENT_TAG: v${{ env.CLEAN_TAG_VERSION }}
          # We provide the same tag as previous to avoid changelog errors
          # since we are relying on GitHub's auto-generated release notes instead
          GORELEASER_PREVIOUS_TAG: v${{ env.CLEAN_TAG_VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Snippy v${{ env.CLEAN_TAG_VERSION }}
          tag_name: ${{ env.TAG_VERSION }}
          generate_release_notes: true
          files: |
            tui/dist/*.tar.gz
            tui/dist/*.zip
            tui/dist/*.deb
            tui/dist/*.rpm

      - name: Push Homebrew Formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "::warning::TAP_GITHUB_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi
          
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/MohamedElashri/homebrew-snippy.git tap-repo
          cd tap-repo
          mkdir -p Formula
          cp ../tui/dist/homebrew/Formula/snippy.rb Formula/
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/snippy.rb
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to Formula, skipping push"
          else
            git commit -m "Update snippy formula to v${{ env.CLEAN_TAG_VERSION }}"
            git push origin HEAD:main || git push origin HEAD:master
          fi
